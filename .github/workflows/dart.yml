name: LMDB2

on:
  push:
    tags:
      - 'dart_lmdb2_v*'
      - 'flutter_lmdb2_v*'
      - 'dart_lmdb2_test_*'
      - 'flutter_lmdb2_test_*'
  pull_request:
    branches: [ "master" ]

jobs:
  build_test_dart_lmdb2:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            cmake-install: sudo apt-get install -y cmake build-essential
            build-android: true
          - os: macos-latest
            cmake-install: brew install cmake
            build-ios: true
          - os: windows-latest
            cmake-install: choco install cmake
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./dart_lmdb2
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      # Setup Android NDK (only Linux)
      - name: Setup Android NDK
        if: matrix.build-android
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
        id: setup-ndk

      - name: Set NDK path
        if: matrix.build-android
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install CMake and build tools
        run: ${{ matrix.cmake-install }}

      - name: Install dependencies
        run: dart pub get

      # Native Builds
      - name: Build native library
        run: dart run tool/build.dart

      # Android Build
      - name: Build Android libraries
        if: matrix.build-android
        run: dart run tool/build.dart --android

      # iOS Build
      - name: Build iOS library
        if: matrix.build-ios
        run: dart run tool/build.dart --ios

      # Tests and analysis
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos

      - name: Run tests
        if: ${{ !matrix.build-android && !matrix.build-ios }}
        run: dart test -j 1

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.os }}
          path: |
            dart_lmdb2/lib/src/native/
            !dart_lmdb2/lib/src/native/android/
            !dart_lmdb2/lib/src/native/ios/

      - name: Upload Android libraries
        if: matrix.build-android
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-android
          path: dart_lmdb2/lib/src/native/android/

      - name: Upload iOS libraries
        if: matrix.build-ios
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-ios
          path: |
            dart_lmdb2/lib/src/native/ios/
            dart_lmdb2/lib/src/native/ios/device/
            dart_lmdb2/lib/src/native/ios/simulator/

  build_test_flutter_lmdb2:
    strategy:
      matrix:
        os: [macos-latest]
        flutter: ['3.27.1']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./flutter_lmdb2
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: 'stable'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      - name: Install dependencies
        run: |
          flutter config --no-analytics --no-cli-animations
          flutter pub get
          cd example || exit 1
          flutter pub get
          cd ..
          dart run flutter_lmdb2:fetch_native
      - name: iOS Setup
        if: matrix.os == 'macos-latest'
        run: |
          flutter config --enable-ios
          flutter precache --ios  # Cache iOS dependencies

      - name: Build and Validate iOS Plugin
        if: matrix.os == 'macos-latest'
        run: |
          cd example/ios || exit 1
          pod repo update
          pod install --verbose
          cd ..
          flutter pub get
          dart run flutter_lmdb2:fetch_native
          flutter build ios --no-codesign

      - name: Build and Validate MacOS Plugin
        if: matrix.os == 'macos-latest'
        run: |
          cd example/macos || exit 1
          pod repo update
          pod install --verbose
          cd ..
          flutter pub get
          dart run flutter_lmdb2:fetch_native
          flutter build macos

      - name: Android Setup
        run: |
          flutter config --enable-android
          flutter precache --android
          yes | flutter doctor --android-licenses

      - name: Build Android Example
        run: |
          cd example
          flutter doctor
          flutter build apk --release

  collect_artifacts:
    if: always()
    needs: [build_test_dart_lmdb2, build_test_flutter_lmdb2]
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform libraries
        uses: actions/download-artifact@v4
        with:
          path: collected_artifacts
        continue-on-error: true

      - name: Show collected artifacts
        run: |
          echo "Collected artifacts:"
          find collected_artifacts -type f -name "*.dylib" -o -name "*.a" -o -name "*.so" -o -name "*.dll" -o -name "*.lib" | sort

      - name: Prepare final artifact structure
        run: |
          mkdir -p final_artifacts/lib/src/native
          mkdir -p final_artifacts/lib/src/native/ios/device
          mkdir -p final_artifacts/lib/src/native/ios/simulator
          # Copy platform specific files
          cp -r collected_artifacts/native-lib-*/macos final_artifacts/lib/src/native/ || true
          cp -r collected_artifacts/native-lib-*/windows final_artifacts/lib/src/native/ || true
          cp -r collected_artifacts/native-lib-*/linux final_artifacts/lib/src/native/ || true
          cp -r collected_artifacts/native-lib-android/* final_artifacts/lib/src/native/android/ || true

          # Copy iOS files
          if [ -d "collected_artifacts/native-lib-ios" ]; then
            mkdir -p final_artifacts/lib/src/native/ios/device
            mkdir -p final_artifacts/lib/src/native/ios/simulator
            cp collected_artifacts/native-lib-ios/device/liblmdb.a final_artifacts/lib/src/native/ios/device/ || true
            cp collected_artifacts/native-lib-ios/simulator/liblmdb.a final_artifacts/lib/src/native/ios/simulator/ || true
          fi

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-native-libraries
          path: final_artifacts/lib/src/native

  docs_dart_lmdb2:
    needs: build_test_dart_lmdb2
    runs-on: ubuntu-latest
    defaults:
          run:
            working-directory: ./dart_lmdb2
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      - name: Install dependencies
        run: |
          dart pub get

      - name: Generate documentation
        run: dart doc

  create_release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [collect_artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag info
        id: tag_info
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == dart_lmdb2_v* ]]; then
            {
              echo "package_name=dart_lmdb2"
              echo "package_version=${TAG_NAME#dart_lmdb2_v}"
              echo "is_test_release=false"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_NAME" == flutter_lmdb2_v* ]]; then
            {
              echo "package_name=flutter_lmdb2"
              echo "package_version=${TAG_NAME#flutter_lmdb2_v}"
              echo "is_test_release=false"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_NAME" == dart_lmdb2_test_* ]]; then
            {
              echo "package_name=dart_lmdb2"
              echo "package_version=test-${TAG_NAME#dart_lmdb2_test_}"
              echo "is_test_release=true"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_NAME" == flutter_lmdb2_test_* ]]; then
            {
              echo "package_name=flutter_lmdb2"
              echo "package_version=test-${TAG_NAME#flutter_lmdb2_test_}"
              echo "is_test_release=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: all-native-libraries
          path: native_libs

      - name: Prepare release archive
        run: |
          PACKAGE_NAME="${{ steps.tag_info.outputs.package_name }}"
          PACKAGE_VERSION="${{ steps.tag_info.outputs.package_version }}"
          IS_TEST="${{ steps.tag_info.outputs.is_test_release }}"

          # Create README in the native_libs directory
          if [[ "$IS_TEST" == "true" ]]; then
            cat > native_libs/README.md << EOF
          # TEST RELEASE: Native Libraries for $PACKAGE_NAME ($PACKAGE_VERSION)

          This is a TEST release and should not be used in production.

          This archive contains the prebuilt native libraries for $PACKAGE_NAME package.

          The archive contains libraries for all supported platforms:
          - Android (arm64-v8a, x86_64)
          - iOS (device arm64, simulator x86_64 + arm64)
          - Linux (x86_64)
          - macOS (universal binary with arm64 + x86_64)
          - Windows (x86_64)
          EOF
          else
            cat > native_libs/README.md << EOF
          # Native Libraries for $PACKAGE_NAME v$PACKAGE_VERSION

          This archive contains the prebuilt native libraries for $PACKAGE_NAME package.

          The archive contains libraries for all supported platforms:
          - Android (arm64-v8a, x86_64)
          - iOS (device arm64, simulator x86_64 + arm64)
          - Linux (x86_64)
          - macOS (universal binary with arm64 + x86_64)
          - Windows (x86_64)
          EOF
          fi

          # Create archive with all libraries
          tar -czf $PACKAGE_NAME-$PACKAGE_VERSION-native-libs.tar.gz -C native_libs .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ steps.tag_info.outputs.is_test_release == 'true' && format('TEST: {0} - {1}', steps.tag_info.outputs.package_name, steps.tag_info.outputs.package_version) || format('{0} v{1}', steps.tag_info.outputs.package_name, steps.tag_info.outputs.package_version) }}"
          files: "${{ steps.tag_info.outputs.package_name }}-${{ steps.tag_info.outputs.package_version }}-native-libs.tar.gz"
          draft: false
          prerelease: ${{ steps.tag_info.outputs.is_test_release == 'true' }}
          generate_release_notes: true
