name: LMDB2

# TEMPORARY NOTICE: Example app builds are currently disabled
# during the transition to the new fetch_native implementation.
# After dart_lmdb2 v0.9.12 and flutter_lmdb2 v0.9.5 are released,
# the example app builds should be re-enabled.

on:
  push:
    tags:
      - 'dart_lmdb2_v*'
      - 'flutter_lmdb2_v*'
      - 'dart_lmdb2_test_*'
      - 'flutter_lmdb2_test_*'
  pull_request:
    branches: [ "master" ]

jobs:
  build_test_dart_lmdb2:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            cmake-install: sudo apt-get install -y cmake build-essential
            build-android: false
          - os: ubuntu-latest
            name: android
            cmake-install: sudo apt-get install -y cmake build-essential
            build-android: true
          - os: macos-latest
            name: macos
            cmake-install: brew install cmake
            build-ios: true
          - os: windows-latest
            name: windows
            cmake-install: choco install cmake
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./dart_lmdb2
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      # Setup Android NDK (only Linux)
      - name: Setup Android NDK
        if: matrix.build-android
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
        id: setup-ndk

      - name: Set NDK path
        if: matrix.build-android
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install CMake and build tools
        run: ${{ matrix.cmake-install }}

      - name: Install dependencies
        run: dart pub get

      # Verify version consistency early
      - name: Verify version consistency
        run: dart run tool/verify_version.dart

      # Native Builds (skip if Android-only build)
      - name: Build native library
        if: matrix.build-android == false
        run: dart run tool/build.dart

      # Android Build (only for Android-specific runners)
      - name: Build Android libraries
        if: matrix.build-android == true
        run: dart run tool/build.dart --android

      # iOS Build
      - name: Build iOS library
        if: matrix.build-ios
        run: dart run tool/build.dart --ios

      # Tests and analysis
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos

      - name: Run tests
        if: matrix.build-android == false && matrix.build-ios != true
        run: dart test -j 1

      - name: Upload native libraries
        if: matrix.build-android == false
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.name }}
          if-no-files-found: error
          path: |
            ./dart_lmdb2/lib/src/native/
            !./dart_lmdb2/lib/src/native/android/
            !./dart_lmdb2/lib/src/native/ios/

      - name: Check Android build output
        if: matrix.build-android == true
        run: |
          echo "Current working directory: $(pwd)"
          echo "Android build output (absolute paths):"
          find $(pwd)/lib/src/native/android -type f | sort || echo "No Android files found"
          echo "Android build output (relative paths):"
          find lib/src/native/android -type f | sort || echo "No Android files found"
          echo "All .so files:"
          find . -name "*.so" | sort || echo "No .so files found"
          echo "Directory structure:"
          ls -la lib/src/native/android/

      - name: Upload Android libraries
        if: matrix.build-android == true
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-android
          if-no-files-found: error
          path: ./dart_lmdb2/lib/src/native/android/**/*.so

      - name: Upload iOS libraries
        if: matrix.build-ios
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-ios
          if-no-files-found: error
          path: |
            ./dart_lmdb2/lib/src/native/ios/
            ./dart_lmdb2/lib/src/native/ios/device/
            ./dart_lmdb2/lib/src/native/ios/simulator/

  build_test_flutter_lmdb2:
    strategy:
      matrix:
        os: [macos-latest]
        flutter: ['3.29.3']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./flutter_lmdb2
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: 'stable'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      - name: Install dependencies
        run: |
          flutter config --no-analytics --no-cli-animations
           # Skip the build for now
          exit 0
          flutter pub get
          cd example || exit 1
          flutter pub get
          cd ..
          dart run flutter_lmdb2:fetch_native
      - name: iOS Setup
        if: matrix.os == 'macos-latest'
        run: |
          flutter config --enable-ios
          flutter precache --ios  # Cache iOS dependencies

      - name: Build and Validate iOS Plugin
        if: matrix.os == 'macos-latest'
        run: |
          # TEMPORARILY DISABLED UNTIL NEW RELEASES ARE PUBLISHED
