          # if [ -d "$PLUGIN_PATH" ]; then
          #   echo "Checking for Android libraries:"
          #   find "$PLUGIN_PATH" -name "*.so" | sort || echo "Android libs not found"
          # fi
          # flutter doctor
          # flutter build apk --release

  collect_artifacts:
    if: always()
    needs: [build_test_dart_lmdb2, build_test_flutter_lmdb2]
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform libraries
        uses: actions/download-artifact@v4
        with:
          path: collected_artifacts
        continue-on-error: true

      - name: Show collected artifacts
        run: |
          echo "Collected artifacts:"
          find collected_artifacts -type f -name "*.dylib" -o -name "*.a" -o -name "*.so" -o -name "*.dll" -o -name "*.lib" | sort
          echo ""
          echo "Android artifact structure:"
          find collected_artifacts/native-lib-android -type f | sort || echo "No Android artifacts found"
          echo ""
          echo "Linux artifact structure:"
          find collected_artifacts/native-lib-linux -type f | sort || echo "No Linux artifacts found"
          echo ""
          echo "macOS artifact structure:"
          find collected_artifacts/native-lib-macos -type f | sort || echo "No macOS artifacts found"
          echo ""
          echo "Windows artifact structure:"
          find collected_artifacts/native-lib-windows -type f | sort || echo "No Windows artifacts found"
          echo ""
          echo "iOS artifact structure:"
          find collected_artifacts/native-lib-ios -type f | sort || echo "No iOS artifacts found"
          echo ""
          echo "Full artifact structure:"
          find collected_artifacts -type f | sort

      - name: Prepare final artifact structure
        run: |
          mkdir -p final_artifacts/lib/src/native
          mkdir -p final_artifacts/lib/src/native/android/arm64-v8a
          mkdir -p final_artifacts/lib/src/native/android/x86_64
          mkdir -p final_artifacts/lib/src/native/ios/device
          mkdir -p final_artifacts/lib/src/native/ios/simulator
          # Copy platform specific files (non-Android platforms don't have dart_lmdb2 prefix)
          echo "Copying platform-specific files..."
          echo "Looking for macOS files:"
          ls -la collected_artifacts/native-lib-macos/macos/ 2>/dev/null || echo "No macOS files found"
          cp -r collected_artifacts/native-lib-macos/macos final_artifacts/lib/src/native/ || echo "Failed to copy macOS files"

          echo "Looking for Windows files:"
          ls -la collected_artifacts/native-lib-windows/windows/ 2>/dev/null || echo "No Windows files found"
          cp -r collected_artifacts/native-lib-windows/windows final_artifacts/lib/src/native/ || echo "Failed to copy Windows files"

          echo "Looking for Linux files:"
          ls -la collected_artifacts/native-lib-linux/linux/ 2>/dev/null || echo "No Linux files found"
          cp -r collected_artifacts/native-lib-linux/linux final_artifacts/lib/src/native/ || echo "Failed to copy Linux files"

          # Move Android files to the correct structure
          if [ -d "collected_artifacts/native-lib-android" ]; then
            echo "Processing Android artifacts..."
            # Find all .so files and move them to the correct directory structure
            find collected_artifacts/native-lib-android -name "*.so" | while read -r file; do
              # Check which ABI directory the file is in
              if [[ "$file" == */arm64-v8a/* ]]; then
                echo "Moving $file to android/arm64-v8a/"
                mv "$file" final_artifacts/lib/src/native/android/arm64-v8a/ || true
              elif [[ "$file" == */x86_64/* ]]; then
                echo "Moving $file to android/x86_64/"
                mv "$file" final_artifacts/lib/src/native/android/x86_64/ || true
              fi
            done
          fi

          # Copy iOS files (iOS structure is different - no ios/ subdirectory)
          if [ -d "collected_artifacts/native-lib-ios" ]; then
            mkdir -p final_artifacts/lib/src/native/ios/device
            mkdir -p final_artifacts/lib/src/native/ios/simulator
            cp collected_artifacts/native-lib-ios/device/liblmdb.a final_artifacts/lib/src/native/ios/device/ || true
            cp collected_artifacts/native-lib-ios/simulator/liblmdb.a final_artifacts/lib/src/native/ios/simulator/ || true
          fi

      # Remove duplicate native libraries from root platform directories
      - name: Clean up duplicate native libraries
        run: |
          echo "Removing duplicate native libraries from root platform directories..."
          # Remove Android libraries
          rm -f final_artifacts/android/**/*.so || true
          # Remove iOS libraries
          rm -f final_artifacts/ios/**/*.a || true
          # Remove Linux libraries
          rm -f final_artifacts/linux/*.so || true
          rm -f final_artifacts/linux/*.a || true
          # Remove macOS libraries
          rm -f final_artifacts/macos/*.dylib || true
          rm -f final_artifacts/macos/*.a || true
          # Remove Windows libraries
          rm -f final_artifacts/windows/*.dll || true
          rm -f final_artifacts/windows/*.lib || true
          echo "Cleanup completed"

      - name: Show final artifact structure
        run: |
          echo "Final artifact structure before upload:"
          find final_artifacts -type f | sort
          echo ""
          echo "Contents by platform:"
          echo "Linux files:"
          find final_artifacts -name "*.so" -not -path "*/android/*" | sort
          echo "macOS files:"
          find final_artifacts -name "*.dylib" | sort
          echo "Windows files:"
          find final_artifacts -name "*.dll" | sort
          echo "Android files:"
          find final_artifacts -path "*/android/*" -name "*.so" | sort
          echo "iOS files:"
          find final_artifacts -name "*.a" | sort

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-native-libraries
          if-no-files-found: error
          path: final_artifacts/lib/src/native

  docs_dart_lmdb2:
    needs: build_test_dart_lmdb2
    runs-on: ubuntu-latest
    defaults:
          run:
            working-directory: ./dart_lmdb2
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      - name: Install dependencies
        run: |
          dart pub get

      - name: Generate documentation
        run: dart doc

  create_release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [collect_artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag info
        id: tag_info
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == dart_lmdb2_v* ]]; then
            {
              echo "package_name=dart_lmdb2"
              echo "package_version=${TAG_NAME#dart_lmdb2_v}"
              echo "is_test_release=false"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_NAME" == flutter_lmdb2_v* ]]; then
            {
              echo "package_name=flutter_lmdb2"
              echo "package_version=${TAG_NAME#flutter_lmdb2_v}"
              echo "is_test_release=false"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_NAME" == dart_lmdb2_test_* ]]; then
            {
              echo "package_name=dart_lmdb2"
              echo "package_version=test-${TAG_NAME#dart_lmdb2_test_}"
              echo "is_test_release=true"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_NAME" == flutter_lmdb2_test_* ]]; then
            {
              echo "package_name=flutter_lmdb2"
              echo "package_version=test-${TAG_NAME#flutter_lmdb2_test_}"
              echo "is_test_release=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: all-native-libraries
          path: native_libs

      - name: Prepare release archive
        run: |
          PACKAGE_NAME="${{ steps.tag_info.outputs.package_name }}"
          PACKAGE_VERSION="${{ steps.tag_info.outputs.package_version }}"
          IS_TEST="${{ steps.tag_info.outputs.is_test_release }}"

          # Generate SHA256 checksums for all native libraries
          declare -A checksums
          for file in $(find native_libs -type f -name "*.so" -o -name "*.dylib" -o -name "*.dll" -o -name "*.a" | sort); do
            relpath="${file#native_libs/}"
            checksum=$(sha256sum "$file" | cut -d' ' -f1)
            checksums["$relpath"]="$checksum"
          done

          # Create manifest.json in the native_libs directory with checksums
          cat > native_libs/manifest.json << EOF
          {
            "version": "$PACKAGE_VERSION",
            "build_date": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')",
            "package": "$PACKAGE_NAME",
            "platforms": {
              "linux": {
                "path": "linux/liblmdb.so",
                "sha256": "${checksums[linux/liblmdb.so]}"
              },
              "macos": {
                "path": "macos/liblmdb.dylib",
                "sha256": "${checksums[macos/liblmdb.dylib]}"
              },
              "windows": {
                "path": "windows/lmdb.dll",
                "sha256": "${checksums[windows/lmdb.dll]}"
              },
              "android-arm64": {
                "path": "android/arm64-v8a/liblmdb.so",
                "sha256": "${checksums[android/arm64-v8a/liblmdb.so]}"
              },
              "android-x64": {
                "path": "android/x86_64/liblmdb.so",
                "sha256": "${checksums[android/x86_64/liblmdb.so]}"
              },
              "ios-device": {
                "path": "ios/device/liblmdb.a",
                "sha256": "${checksums[ios/device/liblmdb.a]}"
              },
              "ios-simulator": {
                "path": "ios/simulator/liblmdb.a",
                "sha256": "${checksums[ios/simulator/liblmdb.a]}"
              }
            }
          }
          EOF

          # Create README in the native_libs directory
          if [[ "$IS_TEST" == "true" ]]; then
            cat > native_libs/README.md << EOF
          # TEST RELEASE: Native Libraries for $PACKAGE_NAME ($PACKAGE_VERSION)

          This is a TEST release and should not be used in production.

          This archive contains the prebuilt native libraries for $PACKAGE_NAME package.

          The archive contains libraries for all supported platforms:
          - Android (arm64-v8a, x86_64)
          - iOS (device arm64, simulator x86_64 + arm64)
          - Linux (x86_64)
          - macOS (universal binary with arm64 + x86_64)
          - Windows (x86_64)
          EOF
          else
            cat > native_libs/README.md << EOF
          # Native Libraries for $PACKAGE_NAME v$PACKAGE_VERSION

          This archive contains the prebuilt native libraries for $PACKAGE_NAME package.

          The archive contains libraries for all supported platforms:
          - Android (arm64-v8a, x86_64)
          - iOS (device arm64, simulator x86_64 + arm64)
          - Linux (x86_64)
          - macOS (universal binary with arm64 + x86_64)
          - Windows (x86_64)
          EOF
          fi

          # Create archive with all libraries
          tar -czf $PACKAGE_NAME-$PACKAGE_VERSION-native-libs.tar.gz -C native_libs .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ steps.tag_info.outputs.is_test_release == 'true' && format('TEST: {0} - {1}', steps.tag_info.outputs.package_name, steps.tag_info.outputs.package_version) || format('{0} v{1}', steps.tag_info.outputs.package_name, steps.tag_info.outputs.package_version) }}"
          files: "${{ steps.tag_info.outputs.package_name }}-${{ steps.tag_info.outputs.package_version }}-native-libs.tar.gz"
          draft: false
          prerelease: ${{ steps.tag_info.outputs.is_test_release == 'true' }}
          generate_release_notes: true
