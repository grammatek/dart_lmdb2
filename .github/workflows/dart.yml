          # dart run flutter_lmdb2:fetch_native
          # PLUGIN_PATH=$(cd ios/.symlinks/plugins/flutter_lmdb2 2>/dev/null || echo "Plugin not found")
          # echo "Plugin path: $PLUGIN_PATH"
          # if [ -d "$PLUGIN_PATH" ]; then
          #   echo "Checking for iOS libraries:"
          #   ls -la "$PLUGIN_PATH/lib/src/native/ios/device/" || echo "Device libs not found"
          #   ls -la "$PLUGIN_PATH/lib/src/native/ios/simulator/" || echo "Simulator libs not found"
          # fi
          # cd ios || exit 1
          # pod repo update
          # pod install --verbose
          # cd ..
          # flutter build ios --no-codesign

      - name: Build and Validate MacOS Plugin
        if: matrix.os == 'macos-latest'
        run: |
          # TEMPORARILY DISABLED UNTIL NEW RELEASES ARE PUBLISHED
          echo "macOS example build temporarily disabled during fetch_native transition"
          echo "This will be re-enabled after dart_lmdb2 v0.9.12 and flutter_lmdb2 v0.9.5 are published"

          # Skip the build for now
          exit 0

          # Original build steps (kept for reference)
          # cd example || exit 1
          # flutter pub get
          # dart run flutter_lmdb2:fetch_native
          # PLUGIN_PATH=$(cd macos/.symlinks/plugins/flutter_lmdb2 2>/dev/null || echo "Plugin not found")
          # echo "Plugin path: $PLUGIN_PATH"
          # if [ -d "$PLUGIN_PATH" ]; then
          #   echo "Checking for macOS libraries:"
          #   ls -la "$PLUGIN_PATH/lib/src/native/macos/" || echo "macOS libs not found"
          # fi
          # cd macos || exit 1
          # pod repo update
          # pod install --verbose
          # cd ..
          # flutter build macos

      - name: Android Setup
        run: |
