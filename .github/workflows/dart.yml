name: LMDB2

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build_test_dart_lmdb2:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            cmake-install: sudo apt-get install -y cmake build-essential
            build-android: true
          - os: macos-latest
            cmake-install: brew install cmake
            build-ios: true
          - os: windows-latest
            cmake-install: choco install cmake
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./dart_lmdb2
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      # Setup Android NDK (only Linux)
      - name: Setup Android NDK
        if: matrix.build-android
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
        id: setup-ndk

      - name: Set NDK path
        if: matrix.build-android
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install CMake and build tools
        run: ${{ matrix.cmake-install }}

      - name: Install dependencies
        run: dart pub get

      # Native Builds
      - name: Build native library
        run: dart run tool/build.dart

      # Android Build
      - name: Build Android libraries
        if: matrix.build-android
        run: dart run tool/build.dart --android

      # iOS Build
      - name: Build iOS library
        if: matrix.build-ios
        run: dart run tool/build.dart --ios

      # Tests and analysis
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos

      - name: Run tests
        if: ${{ !matrix.build-android && !matrix.build-ios }}
        run: dart test -j 1

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.os }}
          path: dart_lmdb2/lib/src/native/

  build_test_flutter_lmdb2:
    strategy:
      matrix:
        os: [macos-latest]
        flutter: ['3.27.1']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./flutter_lmdb2
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: 'stable'
      - uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            ~/.gradle
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      - name: Install dependencies
        run: |
          flutter config --no-analytics --no-cli-animations
          flutter pub get
          dart run flutter_lmdb2:fetch_native
      - name: iOS Setup
        if: matrix.os == 'macos-latest'
        run: |
          flutter config --enable-ios
          flutter precache --ios  # Cache iOS dependencies

      - name: Build and Validate iOS Plugin
        if: matrix.os == 'macos-latest'
        run: |
          cd example/ios || exit 1
          pod repo update
          pod install --verbose
          xcodebuild clean build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

      - name: Build and Validate MacOS Plugin
        if: matrix.os == 'macos-latest'
        run: |
          cd example/macos || exit 1
          pod repo update
          pod install --verbose
          xcodebuild clean build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk macosx \
            CODE_SIGNING_ALLOWED=NO

      - name: Android Setup
        run: |
          flutter config --enable-android
          flutter precache --android
          yes | flutter doctor --android-licenses

      - name: Build Android Example
        run: |
          cd example
          flutter doctor
          flutter build apk --release

  collect_artifacts:
    if: always()
    needs: [build_test_dart_lmdb2, build_test_flutter_lmdb2]
    runs-on: ubuntu-latest
    steps:
      - name: Download all native libraries
        uses: actions/download-artifact@v3
        with:
          path: dart_lmdb2/dart_lmdb2/lib/src/native
        continue-on-error: true
      - name: Show collected artifacts
        run: |
          if [ -d "dart_lmdb2/dart_lmdb2/lib/src/native/*" ]; then
            ls -R dart_lmdb2/dart_lmdb2/lib/src/native/*
          fi
      - name: Upload collected artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-native-libraries
          path: dart_lmdb2/dart_lmdb2/lib/src/native

  publish_dart_lmdb2:
    needs: build_test_dart_lmdb2
    if: github.event_name == 'release' && github.event.action == 'created'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dart_lmdb2
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      - name: Download all native libraries
        uses: actions/download-artifact@v3
        with:
          path: lib/src/native/

      # Optional: Publish to pub.dev
      - name: Publish to pub.dev
        run: dart pub publish --force
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}

  docs_dart_lmdb2:
    needs: build_test_dart_lmdb2
    runs-on: ubuntu-latest
    defaults:
          run:
            working-directory: ./dart_lmdb2
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603

      - name: Install dependencies
        run: |
          dart pub get

      - name: Generate documentation
        run: dart doc
