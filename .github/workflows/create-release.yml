name: Create Release with Binaries

on:
  workflow_run:
    workflows: ["LMDB2"]  # This is the name of the main workflow in dart.yml
    types:
      - completed
    branches:
      - 'master'

jobs:
  check_for_tag_and_success:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_create_release: ${{ steps.check_tag.outputs.should_create_release }}
      tag_name: ${{ steps.check_tag.outputs.tag_name }}
      package_name: ${{ steps.check_tag.outputs.package_name }}
      package_version: ${{ steps.check_tag.outputs.package_version }}
    steps:
      - name: Check if triggered by tag and workflow succeeded
        id: check_tag
        run: |
          # Get the most recent tags
          git fetch --tags origin
          LATEST_TAG=$(git describe --tags --abbrev=0 || echo "")

          if [[ -z "$LATEST_TAG" ]]; then
            echo "No tags found, skipping release creation"
            echo "should_create_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if tag format matches our packages
          if [[ "$LATEST_TAG" == dart_lmdb2_v* ]]; then
            echo "Found dart_lmdb2 tag: $LATEST_TAG"
            echo "should_create_release=true" >> $GITHUB_OUTPUT
            echo "tag_name=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "package_name=dart_lmdb2" >> $GITHUB_OUTPUT
            echo "package_version=${LATEST_TAG#dart_lmdb2_v}" >> $GITHUB_OUTPUT
          elif [[ "$LATEST_TAG" == flutter_lmdb2_v* ]]; then
            echo "Found flutter_lmdb2 tag: $LATEST_TAG"
            echo "should_create_release=true" >> $GITHUB_OUTPUT
            echo "tag_name=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "package_name=flutter_lmdb2" >> $GITHUB_OUTPUT
            echo "package_version=${LATEST_TAG#flutter_lmdb2_v}" >> $GITHUB_OUTPUT
          else
            echo "Tag format doesn't match our packages: $LATEST_TAG"
            echo "should_create_release=false" >> $GITHUB_OUTPUT
          fi

  create_release:
    needs: check_for_tag_and_success
    if: ${{ needs.check_for_tag_and_success.outputs.should_create_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check_for_tag_and_success.outputs.tag_name }}

      - name: Download artifacts from successful workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: dart.yml
          workflow_conclusion: success
          name: all-native-libraries
          path: native_libs

      - name: Prepare release archive
        run: |
          PACKAGE_NAME="${{ needs.check_for_tag_and_success.outputs.package_name }}"
          PACKAGE_VERSION="${{ needs.check_for_tag_and_success.outputs.package_version }}"

          # Create README in the native_libs directory
          cat > native_libs/README.md << EOF
          # Native Libraries for $PACKAGE_NAME v$PACKAGE_VERSION

          This archive contains the prebuilt native libraries for $PACKAGE_NAME package.

          The archive contains libraries for all supported platforms:
          - Android (arm64-v8a, x86_64)
          - iOS (device arm64, simulator x86_64 + arm64)
          - Linux (x86_64)
          - macOS (universal binary with arm64 + x86_64)
          - Windows (x86_64)
          EOF

          # Create archive with all libraries
          tar -czf $PACKAGE_NAME-$PACKAGE_VERSION-native-libs.tar.gz -C native_libs .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check_for_tag_and_success.outputs.tag_name }}
          name: "${{ needs.check_for_tag_and_success.outputs.package_name }} v${{ needs.check_for_tag_and_success.outputs.package_version }}"
          files: "${{ needs.check_for_tag_and_success.outputs.package_name }}-${{ needs.check_for_tag_and_success.outputs.package_version }}-native-libs.tar.gz"
          draft: false
          prerelease: false
          generate_release_notes: true