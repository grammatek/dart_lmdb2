name: dart_lmdb2
description: A modern Dart wrapper for LMDB (Lightning Memory-Mapped Database), providing both high-level convenience methods and low-level transaction control.
version: 0.9.12
homepage: https://github.com/grammatek/dart_lmdb2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  args: ^2.7.0
  ffi: ^2.1.4
  path: ^1.9.1
  http: ^1.4.0
  yaml: ^3.1.3
  archive: ^4.0.7
  crypto: ^3.0.6

dev_dependencies:
  analyzer: ^6.11.0
  ffigen: ^16.1.0
  build_runner: ^2.4.15
  lints: ^5.1.1
  test: ^1.26.0
  pana: ^0.22.21

ffigen:
  output: 'lib/src/generated_bindings.dart'
  headers:
    entry-points:
      - 'src/include/lmdb.h'
  include-unused-typedefs: true
  preamble: |
    // ignore_for_file: type=lint, unused_element, unused_field, unused_typedef

executables:
  build: build
  fetch_native: fetch_native

scripts:
  build: build

example:
  include: ["example/**"]

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
